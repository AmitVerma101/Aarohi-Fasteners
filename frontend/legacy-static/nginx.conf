# Nginx — paste this inside your server {} block
# Clean URLs: /about → serves /about/index.html automatically

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    root /var/www/hbs-fasteners;
    index index.html;

    # Serve clean URLs — try folder/index.html, then .html, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Redirect .html URLs to clean versions
    rewrite ^(/.+)\.html$ $1 permanent;
}
